<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Scroll with IntersectionObserver</title>
    <link rel="stylesheet" href="e14.css">
</head>
<body>

    <h1>Infinite Scroll with Image Boxes</h1>

    <div id="scrollableContainer" class="scrollable-container">
        <div class="box">Box 1</div>
        <div class="box">Box 2</div>
        <div class="box">Box 3</div>
        <div id="loadIndicator" class="box">Loading...</div>
    </div>

    <div id="stats">
        <p>Total Boxes: <span id="totalBoxes">0</span></p>
        <p>Boxes with Images: <span id="imageBoxes">0</span></p>
    </div>

    <script src="e14.js"></script>
</body>
</html>
